services:
  mongodb:
    image: mongo:7.0
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: taskdb
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - task-network

  app:
    build: .
    container_name: task-manager-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://taskuser:taskpassword@mongodb:27017/taskdb?authSource=taskdb
      SPRING_DATA_MONGODB_DATABASE: taskdb
    depends_on:
      - mongodb
    networks:
      - task-network

volumes:
  mongo-data:

networks:
  task-network:
    driver: bridge